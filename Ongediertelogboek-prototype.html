<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#01B52D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Logboek">
<link rel="apple-touch-icon" href="https://ongediertewinkel.nl/content/uploads/2024/03/logo_ongedierte.png">
<link rel="manifest" href='data:application/manifest+json,{"name":"Ongediertewinkel Logboek","short_name":"Logboek","display":"standalone","start_url":".","background_color":"%23F4F6F7","theme_color":"%2301B52D","icons":[{"src":"https://ongediertewinkel.nl/content/uploads/2024/03/logo_ongedierte.png","sizes":"512x512","type":"image/png"}]}'>
<title>Ongediertewinkel · Logboek</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --brand:#01B52D; --brand-d:#019222; --brand-l:#E7F8EC; --accent:#FD5900;
  --ink:#141B1F; --muted:#5C6B73; --line:#E6EAED; --line-2:#EEF1F3;
  --bg:#F4F6F7; --card:#fff;
  --ok:#018F24; --amber:#8A5A12; --red:#A8341F; --blue:#27557F; --grey:#54616B;
  --shadow:0 1px 2px rgba(17,24,28,.05),0 6px 18px rgba(17,24,28,.06);
  --shadow-s:0 1px 2px rgba(17,24,28,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overflow-y:scroll}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
.svi{display:inline-block;width:20px;height:20px;vertical-align:middle;flex:none}

.topbar{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 18px}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.2px;font-size:15px}
.brand .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--brand),#27936A);display:grid;place-items:center;color:#fff}
.brand .dot .svi{width:17px;height:17px}
.brand .sub{color:var(--muted);font-weight:500}
.callhead{display:inline-flex;align-items:center;gap:8px;margin-left:auto;text-decoration:none;color:#E04F00;font-weight:650;font-size:13.5px;background:#FFF1E8;border:1px solid #FFD0B0;padding:8px 13px;border-radius:10px;white-space:nowrap}
.callhead .svi{width:16px;height:16px}
.callhead:hover{background:#FFE6D4}
.tabs .callhead{align-self:center;margin-bottom:8px}
.seg{margin-left:auto;display:flex;background:var(--line-2);border-radius:10px;padding:3px}
.seg button{padding:7px 13px;border-radius:8px;font-weight:600;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
.seg button .svi{width:15px;height:15px}
.seg button.active{background:#fff;color:var(--brand-d);box-shadow:var(--shadow-s)}

.wrap{max-width:1120px;margin:0 auto;padding:22px 18px 64px}

/* desktop */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 17px;box-shadow:var(--shadow-s)}
.stat .n{font-size:27px;font-weight:750;letter-spacing:-.6px}
.stat .l{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tab{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;font-weight:600;color:var(--muted);font-size:14px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab .svi{width:17px;height:17px}
.tab.active{color:var(--brand-d);border-bottom-color:var(--brand)}
.cols{display:grid;grid-template-columns:1.18fr 1fr;gap:20px;align-items:start}
.panel{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow-s);overflow:hidden}
.panel h2{margin:0;padding:15px 19px;font-size:14.5px;font-weight:700;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px}
.panel h2 .svi{width:17px;height:17px;color:var(--brand)}
.panel .body{padding:15px 19px}
.muted{color:var(--muted);font-size:13px}

.loc{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.loc:last-child{border-bottom:none}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:7px;white-space:nowrap}
.chip .svi{width:13px;height:13px}
.cat-rodent{background:#EFEAE4;color:#6E4B34}
.cat-crawl{background:#F6EFDD;color:#8A5A12}
.cat-fly{background:#E7EFF8;color:#28507F}
.cat-stored{background:#EEEAF8;color:#54409E}
.cat-other{background:#EAEDEF;color:#54616B}
.loc .nm{font-weight:650}
.loc .meta{font-size:12px;color:var(--muted)}
.loc .meta b{color:var(--red);font-weight:600}
.qrbtn{margin-left:auto;display:flex;gap:7px}
.iconbtn{width:35px;height:35px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;background:#fff;color:var(--muted)}
.iconbtn .svi{width:17px;height:17px}
.iconbtn:hover{background:var(--bg);color:var(--ink)}

.addrow{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
.addrow input,.addrow select{flex:1;min-width:130px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.addrow input:focus,.addrow select:focus{outline:none;border-color:var(--brand)}
.btn{background:var(--brand);color:#fff;font-weight:650;padding:10px 16px;border-radius:9px;font-size:14px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
.btn .svi{width:17px;height:17px}
.btn:hover{background:var(--brand-d)}
.btn.ghost{background:#fff;color:var(--brand-d);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--bg)}
.btn.block{display:flex;width:100%}
.btn.sm{padding:7px 11px;font-size:12.5px}
.btn.danger{background:var(--red)}
.btn.danger:hover{background:#8f2a18}

.routelist{margin:0;padding:0}
.ritem{display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff;cursor:grab;list-style:none}
.ritem.dragging{opacity:.4}
.ritem.over{border-color:var(--brand);background:var(--brand-l)}
.ritem .grip{color:#AEB6BC;display:grid;place-items:center}
.ritem .grip .svi{width:16px;height:16px}
.ritem .ord{width:23px;height:23px;border-radius:6px;background:var(--brand-l);color:var(--brand-d);display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
.ritem .chip{padding:4px 7px}
.ritem .nm{font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ritem .x{color:#AEB6BC;display:grid;place-items:center;padding:3px;flex:none}
.ritem .x .svi{width:16px;height:16px}
.ritem .x:hover{color:var(--red)}
.poolhint{font-size:12px;color:var(--muted);margin:12px 0 7px}
.pool{display:flex;flex-wrap:wrap;gap:7px}
.pchip{display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--line);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:550;background:#fff;color:var(--ink)}
.pchip .svi{width:14px;height:14px;color:var(--muted)}
.pchip:hover{border-color:var(--brand);border-style:solid;color:var(--brand-d)}
.seclabel{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:16px 0 8px}

/* modal */
.modal{position:fixed;inset:0;background:rgba(16,24,20,.5);display:grid;place-items:center;z-index:60;padding:20px;backdrop-filter:blur(2px)}
.modalcard{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.28);max-height:88vh;overflow:auto}
.modalcard h3{margin:.4em 0 .1em;font-size:18px}
#qrbox{display:grid;place-items:center;margin:16px 0}
#qrbox img,#qrbox canvas{border-radius:8px}
.fld-l{display:block;font-weight:650;font-size:12.5px;margin:13px 0 6px}
.fld{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.fld:focus{outline:none;border-color:var(--brand)}
.selctl{appearance:none;-webkit-appearance:none;width:auto;font-weight:650;padding:8px 38px 8px 13px;background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C6B73' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>") no-repeat right 13px center/14px}

/* floorplan */
.floortabs{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.ctlgroup{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line-2);border-radius:13px;padding:8px 11px}
.ctlgroup .ctlbl{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:3px}
.ctlgroup .ftab{background:#fff}
.ftab{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line);border-radius:9px;font-weight:600;font-size:13px;background:#fff;color:var(--muted)}
.ftab .svi{width:15px;height:15px}
.ftab.active{border-color:var(--brand);color:var(--brand-d);background:var(--brand-l)}
.ftab.add{border-style:dashed}
.ftab.add:hover{color:var(--brand-d);border-color:var(--brand)}
.fpzone{border:1.5px dashed var(--line);border-radius:12px;padding:34px 20px;text-align:center;background:var(--bg)}
.fpz-ic{width:48px;height:48px;border-radius:12px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;margin:0 auto 12px;color:var(--brand)}
.fpz-ic .svi{width:24px;height:24px}
.fpz-t{font-weight:700;font-size:16px}
.fpz-d{color:var(--muted);font-size:13px;margin:3px auto 0;max-width:460px}
.fpz-btns{display:flex;gap:10px;justify-content:center;margin:17px 0 4px;flex-wrap:wrap}
.fpz-skip{display:block;margin:10px auto 0;color:var(--muted);font-size:13px;font-weight:550}
.fpz-skip:hover{color:var(--brand-d)}
.maptools{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:10px;flex-wrap:wrap}
.maptools .muted{display:inline-flex;align-items:center;gap:7px;font-weight:550}
.maptools .muted .svi{width:16px;height:16px;color:var(--brand)}
.fp-bar-r{display:flex;gap:8px;align-items:stretch}
.maptools .placehint{padding:10px 16px}
.maptools .toggle,.maptools .btn.sm{padding:10px 14px;font-size:13px}
.placehint{display:flex;align-items:center;gap:10px;background:var(--brand-l);border:1px solid #C2EFCE;color:var(--brand-d);border-radius:11px;padding:13px 16px;font-size:14.5px;margin-bottom:13px;font-weight:550}
.placehint .svi{width:20px;height:20px;flex:none}
.placehint b{font-weight:750}
.placehint.active{background:#FBEDEA;border-color:#F1D4CC;color:var(--red)}
.toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-weight:600;font-size:12.5px;background:#fff;color:var(--muted)}
.toggle .svi{width:15px;height:15px}
.toggle.on{border-color:#C9462B;color:#A8341F;background:#FBEDEA}
.fpwrap{position:relative;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:crosshair;background:#fbfcfd;line-height:0}
.fpwrap img{width:100%;display:block;user-select:none;-webkit-user-select:none}
.heat{position:absolute;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;mix-blend-mode:multiply;z-index:1}
.pin{position:absolute;z-index:2;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50% 50% 50% 3px;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 2px 7px rgba(16,24,28,.35);cursor:pointer;color:#fff}
.pin .svi{width:15px;height:15px}
.pin-rodent{background:#8A5A3C}.pin-crawl{background:#A6741A}.pin-fly{background:#2E6DA6}.pin-stored{background:#6A4FC0}.pin-other{background:#5F6B76}
.pin.temp{background:var(--brand);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.14)}}

/* metrics / rank / log */
.metricrow{display:flex;gap:10px;margin:14px 0 6px;flex-wrap:wrap}
.metric{flex:1;min-width:120px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
.metric .mv{font-size:21px;font-weight:750;letter-spacing:-.4px}
.metric .ml{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.rankrow{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.rankrow:last-child{border:none}
.rankrow .rk{width:24px;font-weight:750;color:var(--muted);text-align:center;flex:none}
.rankrow .rn{width:210px;font-weight:600;display:flex;align-items:center;gap:8px;flex:none;overflow:hidden}
.rankrow .rn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rankbar{flex:1;height:10px;background:var(--line-2);border-radius:99px;overflow:hidden}
.rankbar>i{display:block;height:100%;border-radius:99px}
.rankval{width:120px;text-align:right;font-size:13px;color:var(--muted);flex:none}
.logrow{display:flex;gap:12px;align-items:flex-start;padding:11px 2px;border-bottom:1px solid var(--line-2)}
.logrow:last-child{border:none}
.logrow .ld{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.logrow .lc{flex:1;min-width:0}
.logrow .lt{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logrow .lm{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logrow .lr{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap;flex:none;align-self:center}
.logrow .la{display:flex;gap:6px;margin-left:12px;flex:none;align-self:center}
.logrow .la .iconbtn{width:32px;height:32px}
.logrow .la .iconbtn .svi{width:16px;height:16px}
.logrow .la .iconbtn.lgdel{color:var(--red);border-color:#F1D4CC}
.logrow .la .iconbtn.lgdel:hover{background:#FBEDEA}
.logfilters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:15px;padding-bottom:15px;border-bottom:1px solid var(--line-2)}
.lff{display:flex;flex-direction:column;gap:5px}
.lff label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.logfilters select,.logfilters input{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:13px;color:var(--ink);min-width:150px}
.logfilters input[type=date]{min-width:140px}
.logfilters select:focus,.logfilters input:focus{outline:none;border-color:var(--brand)}
.detail-log{margin-top:4px}
.aibox{background:linear-gradient(180deg,#F0FBF3,#fff);border:1px solid #C2EFCE;border-radius:14px;padding:18px;margin-bottom:20px}
.aibox .aihead{display:flex;align-items:center;gap:9px;font-weight:750;color:var(--brand-d);margin-bottom:8px;font-size:15px}
.aibox .aihead .svi{width:20px;height:20px}
.aibox p{margin:0;font-size:14.5px;line-height:1.6}
.actionlist{list-style:none;margin:0 0 6px;padding:0}
.actionlist li{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.actionlist li:last-child{border:none}
.actionlist .ai-ic{width:32px;height:32px;border-radius:9px;background:var(--brand-l);color:var(--brand-d);display:grid;place-items:center;flex:none}
.actionlist .ai-ic .svi{width:18px;height:18px}
.actionlist .at{font-weight:650;font-size:14px}
.actionlist .ad{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.45}
.prodgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px}
.advblock{border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow-s);margin-bottom:16px;overflow:hidden}
.advhead{display:flex;align-items:center;gap:12px;padding:14px 17px;border-bottom:1px solid var(--line-2);background:var(--bg)}
.advic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none}
.advic .svi{width:21px;height:21px}
.advtitle{font-weight:750;font-size:15.5px}
.advsub{font-size:12.5px;color:var(--muted);margin-top:1px}
.advbadge{margin-left:auto;font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:999px;white-space:nowrap;flex:none}
.advsteps{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr))}
.stepcard{padding:15px 17px;border-right:1px solid var(--line-2);cursor:pointer;display:flex;flex-direction:column;gap:8px;min-width:0}
.stepcard:last-child{border-right:none}
.stepcard:hover{background:#FBFDFB}
.steptag{font-size:11px;font-weight:750;letter-spacing:.5px;text-transform:uppercase;color:var(--brand-d);display:flex;align-items:center;gap:7px}
.steptag .stepnum{width:18px;height:18px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;flex:none}
.stepimg{height:112px;display:grid;place-items:center}
.stepimg img{max-height:106px;max-width:100%;object-fit:contain}
.stepimg .svi{width:36px;height:36px;color:#B9C2C8}
.stepcard .pn{font-weight:650;font-size:13.5px;line-height:1.3}
.stepcard .why{font-size:12px;color:var(--muted);line-height:1.45;flex:1}
.stepfoot{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.stepfoot .pp{font-weight:800;font-size:16px}
.stepfoot .go{font-size:12.5px;font-weight:700;color:var(--brand-d)}
.stepcol{padding:14px 15px;border-right:1px solid var(--line-2);min-width:0}
.stepcol:last-child{border-right:none}
.stepwhy{font-size:12px;color:var(--muted);margin:4px 0 2px}
.prow{display:flex;gap:9px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:10px;margin-top:8px;cursor:pointer;background:#fff}
.prow:hover{border-color:var(--brand);background:#FBFDFB}
.prowimg{width:56px;height:56px;flex:none;display:grid;place-items:center;background:#fff;border-radius:8px}
.prowimg img{max-width:54px;max-height:54px;object-fit:contain}
.prowimg .svi{width:22px;height:22px;color:#B9C2C8}
.prowb{flex:1;min-width:0}
.pn2{font-size:12.5px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pp2{font-weight:750;font-size:12.5px;margin-top:2px}
.prowact{display:flex;flex-direction:column;gap:4px;flex:none}
.prowact button{width:23px;height:23px;border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;color:var(--muted);background:#fff}
.prowact button:hover{color:var(--brand-d);border-color:var(--brand)}
.prowact button.bad:hover{color:var(--red);border-color:#F1D4CC}
.prowact .svi{width:11px;height:11px}
.selchk{width:21px;height:21px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;color:#fff;background:#fff}
.prow.sel{border-color:var(--brand);background:var(--brand-l)}
.prow.sel .selchk{background:var(--brand);border-color:var(--brand)}
.selchk .svi{width:11px;height:11px}
.plink{width:23px;height:23px;border:1px solid var(--line);border-radius:6px;display:grid;place-items:center;color:var(--muted);background:#fff;flex:none;font-weight:700}
.plink:hover{color:var(--brand-d);border-color:var(--brand)}
.selbar{position:fixed;right:94px;bottom:30px;z-index:55;display:inline-flex;align-items:center;gap:9px;background:var(--brand);color:#fff;font-weight:750;border-radius:999px;padding:15px 22px;box-shadow:0 10px 28px rgba(21,92,66,.45);font-size:14px;animation:tipin .3s ease}

// Heatmap-score: alleen negatieve activiteit (vangst/waarneming) van <90 dagen, recente meldingen wegen zwaarder.
function heatScore(id){
  const now=Date.now(), win=90*864e5; let s=0;
  (logs[id]||[]).forEach(e=>{
    if(!e.alert || e.count==null) return;
    const age=now-e.ts; if(age>win) return;
    const w=Math.max(0,(win-age)/win);
    s += (+e.count||0)*w;
  });
  return s;
}

function fileToScaledDataURL(file, cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;const max=1600;
    if(w>max){h=Math.round(h*max/w);w=max;}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    let out=''; try{out=cv.toDataURL('image/jpeg',0.82);}catch(e){}
    URL.revokeObjectURL(img.src); cb(out);
  };
  img.onerror=()=>{const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file);};
  img.src=URL.createObjectURL(file);
}

    aiPrefs=s.aiPrefs||{boost:{},block:{}}; if(!aiPrefs.boost)aiPrefs.boost={}; if(!aiPrefs.block)aiPrefs.block={};

const FEED_URL='https://files.channable.com/dwD1o_pqBw2QYlIAtYcwuA==.xml';

let PRODIDX={};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function buildProdIdx(){
  PRODIDX={};
  Object.keys(PRODUCTS).forEach(k=>{PRODIDX[k]=Object.assign({id:k},PRODUCTS[k]);});
  shopProducts.forEach(p=>{PRODIDX[p.id]=p;});
}
function getProd(id){return PRODIDX[id];}
function productsForCat(cat,n){
  const feed=shopProducts.filter(p=>p.cat===cat);
  if(feed.length) return feed.slice(0,n||3);
  return Object.keys(PRODUCTS).filter(k=>PRODUCTS[k].cat===cat).slice(0,n||3).map(k=>PRODIDX[k]);
}
function feedCat(txt){
  const t=(txt||'').toLowerCase();
  if(/kakkerlak|mieren|\bmier\b|zilvervis|bedwants|vlooien|\bvlo\b|kruipend|spinnen|\bspin\b/.test(t))return 'crawl';
  if(/motten|\bmot\b|feromoon|voorraadinsect/.test(t))return 'stored';
  if(/vlieg|muggen|\bmug\b|wesp|uv-?lamp|insectenlamp|plakstrip|fruitvlieg/.test(t))return 'fly';
  if(/muizen|muis|ratten|\brat\b|knaagdier|lokdoos|klem|rodent|aasblok|\baas\b/.test(t))return 'rodent';
  return 'other';
}
function parseFeed(xmlText){
  const doc=new DOMParser().parseFromString(xmlText,'text/xml');
  const NS='http://base.google.com/ns/1.0';
  const items=Array.prototype.slice.call(doc.getElementsByTagName('item'));
  const val=(it,names)=>{for(let i=0;i<names.length;i++){const name=names[i];
    const e=(it.getElementsByTagNameNS?it.getElementsByTagNameNS(NS,name)[0]:null)||it.getElementsByTagName('g:'+name)[0]||it.getElementsByTagName(name)[0];
    if(e&&e.textContent.trim())return e.textContent.trim();}return '';};
  const out=[];
  items.forEach(it=>{
    const title=val(it,['title']); if(!title)return;
    const rid=(val(it,['id','articlenumber'])||String(out.length)).replace(/[^a-zA-Z0-9_-]/g,'');
    let price=val(it,['price','sale_price','sellprice','fromprice','retailprice']).replace(/\s?EUR/i,'').trim();
    if(price&&price.indexOf('€')<0) price='€'+price.replace('.',',');
    const gc=it.getElementsByTagName('google_category')[0];
    const cats=val(it,['product_type'])+' '+val(it,['google_product_category'])+' '+val(it,['category0'])+' '+val(it,['category1'])+' '+val(it,['category2'])+' '+(gc?gc.textContent:'');
    out.push({id:'s_'+rid,name:esc(title),price,link:val(it,['link']),image:val(it,['image_link','imageurl','image']),cat:feedCat(title+' '+cats),tag:'',desc:esc(val(it,['description']).slice(0,600))});
  });
  return out.slice(0,500);
}
function parseJina(md){
  const out=[];
  const re=/###\s*\[([^\]]+)\]\((https?:[^)\s]+)\)\s*\n+([^#]*)/g;
  let m;
  while((m=re.exec(md)) && out.length<500){
    const title=m[1].trim(), link=m[2].trim(), block=m[3]||'';
    const im=/!\[[^\]]*\]\((https?:[^)\s]+)\)/.exec(block);
    const pr=/€\s?(\d+[.,]\d{2})/.exec(block);
    out.push({id:'s_'+out.length+'_'+title.replace(/[^a-zA-Z0-9]/g,'').slice(0,24),
      name:esc(title), price:pr?('€'+pr[1].replace('.',',')):'',
      link, image:im?im[1]:'', cat:feedCat(title+' '+block.slice(0,250)), tag:'', desc:esc(block.trim().slice(0,400))});
  }
  return out;
}
async function loadFeed(force){
  try{
    const cached=JSON.parse(localStorage.getItem('owlog_feed4')||'null');
    if(cached&&cached.url===FEED_URL&&cached.products&&cached.products.length){shopProducts=cached.products;buildProdIdx();}
    if(cached&&cached.url===FEED_URL&&!force&&(Date.now()-cached.fetchedAt)<24*3600*1000) return;
  }catch(e){}
  const enc=encodeURIComponent(FEED_URL);
  const sources=[
    {u:FEED_URL, kind:'xml'},
    {u:'https://test.cors.workers.dev/?'+FEED_URL, kind:'xml'},
    {u:'https://api.allorigins.win/raw?url='+enc, kind:'xml'},
    {u:'https://corsproxy.io/?url='+enc, kind:'xml'},
    {u:'https://api.codetabs.com/v1/proxy/?quest='+enc, kind:'xml'},
    {u:'https://r.jina.ai/'+FEED_URL, kind:'jina'},
  ];
  function applyFeed(prods){
    shopProducts=prods;buildProdIdx();
    try{localStorage.setItem('owlog_feed4',JSON.stringify({url:FEED_URL,fetchedAt:Date.now(),products:prods}));}catch(e){}
    if(view==='desktop')renderDesktop();else renderMobile();
  }
  let backup=null;
  for(const src of sources){
    try{
      const res=await fetch(src.u,{cache:'no-store'});
      if(!res.ok) continue;
      const txt=await res.text();
      if(!txt || txt.length<500) continue;
      const prods=(src.kind==='jina')?parseJina(txt):parseFeed(txt);
      if(!prods.length) continue;
      if(prods.some(p=>p.image)){applyFeed(prods);return;} /* voorkeur voor bron mét productfoto's */
      if(!backup) backup=prods;
    }catch(e){/* probeer volgende bron */}
  }
  if(backup) applyFeed(backup);
}

function catSignals(cat){
  const cut=Date.now()-30*864e5;
  let catches=0,aas=0,full=0;
  locations.forEach(l=>{const t=TYPES[l.type];if(!t||t.cat!==cat)return;
    (logs[l.id]||[]).forEach(e=>{if(e.ts<cut)return;
      if(/catch|seen|many|activity/.test(e.status))catches+=(+e.count||1);

  if(mode==='replace')return [

    {r:'monitoren',lbl:'Blijf monitoren',why:'Volg of de vangst afneemt.',match:p=>prodRole(p)==='monitoren'},
    {r:'voorkomen',lbl:'Voorkom terugkeer',why:'Houd nieuwe insecten buiten.',match:p=>prodRole(p)==='voorkomen'},

    {r:'voorkomen',lbl:'Voorkom terugkeer',why:'Zorg dat het niet terugkomt.',match:p=>prodRole(p)==='voorkomen'},
  ];
}
function planForCat(cat,steps){
  const pool=productsForCat(cat,100);
  const used={};const out={};
  steps.forEach(st=>{
    const k=prefKey(cat,st.r);
    const block=aiPrefs.block[k]||[], boost=aiPrefs.boost[k]||[];
    const boosted=boost.map(id=>pool.find(p=>p.id===id&&!used[p.id]&&!block.includes(p.id))).filter(Boolean);
    const cand=boosted.concat(pool.filter(p=>!used[p.id]&&!block.includes(p.id)&&!boost.includes(p.id)&&st.match(p)));
    out[st.r]=[];
    for(const p of cand){if(out[st.r].length>=3)break;if(!used[p.id]){used[p.id]=1;out[st.r].push(p);}}
  });
  steps.forEach(st=>{
    const block=aiPrefs.block[prefKey(cat,st.r)]||[];
    for(const p of pool){if(out[st.r].length>=3)break;if(!used[p.id]&&!block.includes(p.id)){used[p.id]=1;out[st.r].push(p);}}
  });
  return out;
}

        ${fps.length?`<button class="ftab" onclick="openFloorEditModal()" title="Plattegrond hernoemen">${ic('pencil')}</button>
        <button class="ftab" style="color:var(--red)" onclick="askRemoveFloor()" title="Plattegrond verwijderen">${ic('trash')}</button>`:''}
      </div></div>`;
  if(!fps.length){
    html+=`<div class="fpzone">
      <div class="fpz-ic">${ic('map')}</div>
      <div class="fpz-t">Maak een plattegrond aan voor dit pand</div>
      <div class="fpz-d">Upload een plattegrond en klik daarna op de tekening om aan te geven waar een val staat. Per pand kun je meerdere plattegronden toevoegen (bijv. per verdieping).</div>
      <div class="fpz-btns"><button class="btn" onclick="openFloorModal()">${ic('upload')} Plattegrond toevoegen</button></div>
    </div>`;
  } else {
    const f=fps.find(x=>x.id===activeFloor)||fps[0];
    activeFloor=f.id;
    html+=`<div class="maptools">
      <div class="placehint ${placingId!=null?'active':''}" style="margin:0;flex:1;min-width:280px">${ic('pin')}<span>${placingId!=null?'<b>Klik op de gewenste plek</b> om deze val daar te plaatsen.':'<b>Klik ergens op de plattegrond</b> om daar een nieuwe val te plaatsen.'}</span></div>
      <div class="fp-bar-r">
        <button class="toggle ${heatOn?'on':''}" onclick="toggleHeat()">${ic('flame')} Heatmap ${heatOn?'aan':'uit'}</button>
        <button class="btn ghost sm" onclick="askReplaceFloor()">${ic('upload')} Vervangen</button>
        <input type="file" id="replInput" accept="image/*" style="display:none" onchange="replaceFloor(event)">
      </div></div>
      <div class="fpwrap" id="fpwrap" onclick="placeOnMap(event)"><img src="${f.src}" alt="plattegrond" draggable="false">`;
    const locs=locations.filter(l=>l.floorId===f.id && l.x!=null);
    if(heatOn){
      html+=locs.map(l=>{
        const sc=heatScore(l.id); if(sc<=0) return '';
        // 4 duidelijke gradaties: elke stap lager = kleiner rondje
        const lvl = sc>5?4 : sc>3?3 : sc>1.5?2 : 1;
        const r=lvl/4;
        const hue=Math.round(18*(1-r));
        const op=(0.30+r*0.38).toFixed(2);
        const sz=80+lvl*36;
        return `<span class="heat" style="left:${l.x}%;top:${l.y}%;width:${sz}px;height:${sz}px;background:radial-gradient(circle, hsla(${hue},85%,48%,${op}) 0%, hsla(${hue},85%,48%,0) 70%)"></span>`;
      }).join('');
    }
    html+=locs.map(l=>{const c=catOf(l.type);return `<button class="pin pin-${TYPES[l.type].cat}" style="left:${l.x}%;top:${l.y}%" title="${l.name}" onclick="event.stopPropagation();locDetail(${l.id})">${ic(c.gi)}</button>`;}).join('');
    html+=`</div>`;
  }
  html+=`</div></div>
    <div class="cols">
      <div class="panel"><h2>${ic('pin')}Locaties</h2><div class="body">
        <div id="locList"></div>
      </div></div>
      <div class="panel"><h2>${ic('list')}Controleroute — sleep om de volgorde te bepalen</h2><div class="body">
        <ul class="routelist" id="routeList"></ul>
        <div class="poolhint">Klik om toe te voegen aan de route:</div>
        <div class="pool" id="routePool"></div>
      </div></div>
    </div>`;
  document.getElementById('tabMap').innerHTML=html;
  renderLocList();
  renderRoute();
  saveState();
}

function renderLocList(){
  const sel=document.getElementById('newLocType');
  if(sel){const cur=sel.value;sel.innerHTML=typeOptions();if(cur&&[...sel.options].some(o=>o.value===cur&&o.value!=='__new__'))sel.value=cur;else sel.selectedIndex=0;sel.onchange=onTypeSelectChange;}
  const list=document.getElementById('locList'); if(!list) return;
  list.innerHTML='';
  const locs = activeFloor ? locations.filter(l=>l.floorId===activeFloor) : locations;
  if(!locs.length){list.innerHTML='<p class="muted">Nog geen vallen op deze plattegrond. Klik op de plattegrond om er een te plaatsen.</p>';return;}
  locs.forEach(l=>{
    const t=TYPES[l.type];const c=catOf(l.type);
    const act=activityTotal(l.id);
    const row=el(`<div class="loc">
      <span class="chip ${c.chip}">${ic(c.gi)} ${c.label}</span>
      <div><div class="nm">${l.name}</div><div class="meta">geplaatst ${fmtDate(l.placedAt)} · ${act} vangst(en)</div></div>
      <div class="qrbtn">
        <button class="iconbtn" data-act="detail" title="Logboek van deze val">${ic('clock')}</button>
        <button class="iconbtn" data-act="edit" title="Gegevens aanpassen">${ic('pencil')}</button>
        <button class="iconbtn" data-act="qr" title="QR tonen">${ic('qr')}</button>
        <button class="iconbtn" data-act="del" title="Verwijderen">${ic('trash')}</button>
      </div></div>`);
    row.querySelector('[data-act=detail]').onclick=()=>locDetail(l.id);
    row.querySelector('[data-act=edit]').onclick=()=>editLocation(l.id);
    row.querySelector('[data-act=qr]').onclick=()=>showQR(l);
    row.querySelector('[data-act=del]').onclick=()=>deleteLocation(l.id);
    list.appendChild(row);
  });
}

function addLocation(){
  const name=document.getElementById('newLocName').value.trim();
  const type=document.getElementById('newLocType').value;
  if(type==='__new__'){toast('Kies of maak eerst een type');return;}
  if(!name){toast('Geef een naam op');return;}
  if(nameTaken(name)){toast('Er bestaat al een locatie met deze naam');return;}
  const id=nextId++;
  locations.push({id,name,type,code:'OW-'+String(id).padStart(3,'0'),placedAt:Date.now(),floorId:activeFloor});
  if(activeFloor)routeFor(activeFloor).push(id);
  document.getElementById('newLocName').value='';
  toast('Locatie toegevoegd · in route geplaatst');
  renderDesktop();
}

/* ---- route ---- */
function renderRoute(){
  const list=document.getElementById('routeList'); if(!list) return;
  list.innerHTML='';
  if(!activeFloor){list.innerHTML='<span class="muted">Maak eerst een plattegrond aan.</span>';return;}
  const r=routeFor(activeFloor);
  r.forEach((id,i)=>{
    const l=locById(id); if(!l)return;
    const c=catOf(l.type);
    const li=el(`<li class="ritem" draggable="true" data-id="${id}">
      <span class="grip">${ic('grip')}</span><span class="ord">${i+1}</span>
      <span class="chip ${c.chip}">${ic(c.gi)}</span>
      <span class="nm">${l.name}</span>
      <button class="x" title="Uit route">${ic('x')}</button></li>`);
    li.querySelector('.x').onclick=()=>{routes[activeFloor]=r.filter(x=>x!==id);renderRoute();syncDash();};
    addDrag(li);
    list.appendChild(li);
  });
  const pool=document.getElementById('routePool'); pool.innerHTML='';
  locations.filter(l=>l.floorId===activeFloor && !r.includes(l.id)).forEach(l=>{
    const ch=el(`<button class="pchip">${ic('plus')} ${l.name}</button>`);
    ch.onclick=()=>{routeFor(activeFloor).push(l.id);renderRoute();syncDash();};
    pool.appendChild(ch);
  });
  if(!pool.children.length) pool.innerHTML='<span class="muted">Alle vallen van deze plattegrond zitten in de route.</span>';
}
function syncDash(){ /* dashboardtellers verwijderd */ }
let dragEl=null;
function addDrag(li){
  li.addEventListener('dragstart',()=>{dragEl=li;li.classList.add('dragging');});
  li.addEventListener('dragend',()=>{li.classList.remove('dragging');document.querySelectorAll('.ritem').forEach(x=>x.classList.remove('over'));commitRoute();});
  li.addEventListener('dragover',e=>{e.preventDefault();
    const list=li.parentNode;const after=getAfter(list,e.clientY);
    document.querySelectorAll('.ritem').forEach(x=>x.classList.remove('over'));
    if(after==null){list.appendChild(dragEl);}else{list.insertBefore(dragEl,after);after.classList.add('over');}
  });
}
function getAfter(list,y){
  const els=[...list.querySelectorAll('.ritem:not(.dragging)')];
  return els.reduce((closest,child)=>{const box=child.getBoundingClientRect();const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset)return{offset,element:child};return closest;},{offset:-Infinity}).element||null;
}
function commitRoute(){if(activeFloor)routes[activeFloor]=[...document.querySelectorAll('#routeList .ritem')].map(li=>+li.dataset.id);renderRoute();}

function saveFloorEdit(){
  const f=floorplans.find(x=>x.id===activeFloor); if(!f) return;
  const name=document.getElementById('flEdit').value.trim();
  if(!name){toast('Geef een naam op');return;}
  if(floorplans.some(x=>x.id!==f.id&&x.pandId===f.pandId&&x.name.trim().toLowerCase()===name.toLowerCase())){toast('Er bestaat al een plattegrond met deze naam in dit pand');return;}
  const old=f.name;
  locations.forEach(l=>{if(l.floorId===f.id && l.name.indexOf(old+' - ')===0){l.name=name+' - '+l.name.slice(old.length+3);}});
  f.name=name;
  document.getElementById('modalHost').innerHTML='';
  renderDesktop();toast('Plattegrond hernoemd');
}
function deletePand(){
  const p=panden.find(x=>x.id===activePand); if(!p) return;
  confirmModal(`Pand ‘${p.name}’ inclusief plattegronden, vallen en meldingen verwijderen?`,()=>{
    const fids=floorplans.filter(f=>f.pandId===activePand).map(f=>f.id);
    locations=locations.filter(l=>{const del=fids.includes(l.floorId);if(del)delete logs[l.id];return !del;});
    fids.forEach(fid=>delete routes[fid]);
    floorplans=floorplans.filter(f=>!fids.includes(f.id));
    panden=panden.filter(x=>x.id!==activePand);
    activePand=(panden[0]||{}).id||null;
    const fps=floorplans.filter(f=>f.pandId===activePand);
    activeFloor=fps.length?fps[0].id:null;
    renderDesktop();toast('Pand verwijderd');
  },'Verwijderen');
}

function printQR(id){
  const l=locById(id);const box=document.getElementById('qrbox');if(!box||!l)return;
  const node=box.querySelector('img')||box.querySelector('canvas');
  let src=''; if(node){src=node.tagName==='IMG'?node.src:node.toDataURL();}
  const w=window.open('','_blank');
  if(!w){toast('Sta pop-ups toe om te kunnen printen');return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>QR ${l.name}</title>
    <style>@page{size:A4;margin:2cm} html,body{height:100%} body{margin:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .nm{font-size:32px;font-weight:bold;margin:0 0 8px} .ty{font-size:19px;color:#555;margin:0 0 26px} img{width:9cm;height:9cm}</style></head>
    <body><div class="nm">${l.name}</div><div class="ty">${TYPES[l.type].name}</div><img src="${src}">
    <scr`+`ipt>window.onload=function(){setTimeout(function(){window.print();},200);};</scr`+`ipt></body></html>`);
  w.document.close();
}

/* ---- LOGBOEK TAB ---- */
function renderLogTab(){
  const f=logFilter;
  let all=[];
  Object.keys(logs).forEach(id=>{const l=locById(+id);(logs[id]||[]).forEach(e=>all.push({e,l}));});
  const fromTs=f.from?new Date(f.from+'T00:00:00').getTime():null;
  const toTs=f.to?new Date(f.to+'T23:59:59').getTime():null;
  all=all.filter(({e,l})=>{
    if(f.floor){ if(!l||l.floorId!==f.floor) return false; }
    if(f.loc){ if(!l||l.id!==+f.loc) return false; }
    if(fromTs!=null && e.ts<fromTs) return false;
    if(toTs!=null && e.ts>toTs) return false;
    return true;
  });
  all.sort((a,b)=>b.e.ts-a.e.ts);
  const floorOpts=`<option value="">Alle plattegronden</option>`+floorplans.map(fp=>`<option value="${fp.id}" ${f.floor===fp.id?'selected':''}>${floorLabel(fp)}</option>`).join('');
  const locs=locations.filter(l=>!f.floor||l.floorId===f.floor).slice().sort((a,b)=>a.name.localeCompare(b.name));
  const locOpts=`<option value="">${f.floor?'Alle vallen op deze plattegrond':'Alle vallen'}</option>`+locs.map(l=>`<option value="${l.id}" ${f.loc==l.id?'selected':''}>${l.name}</option>`).join('')+(f.floor&&!locs.length?`<option value="" disabled>— geen vallen op deze plattegrond —</option>`:'');
  const hasFilter=f.floor||f.loc||f.from||f.to;
  const filterBar=`<div class="logfilters">
    <div class="lff"><label>Plattegrond</label><select onchange="setLogFilter('floor',this.value)">${floorOpts}</select></div>
    <div class="lff"><label>Val</label><select onchange="setLogFilter('loc',this.value)">${locOpts}</select></div>
    <div class="lff"><label>Van datum</label><input type="date" value="${f.from}" onchange="setLogFilter('from',this.value)"></div>
    <div class="lff"><label>Tot datum</label><input type="date" value="${f.to}" onchange="setLogFilter('to',this.value)"></div>
    ${hasFilter?`<div class="lff"><button class="btn ghost sm" onclick="clearLogFilter()">${ic('x')} Wis filters</button></div>`:''}
    <div class="lff" style="margin-left:auto"><button class="btn" onclick="openExportModal()">${ic('print')} Exporteren</button></div>
  </div>`;
  const rows=all.map(({e,l})=>{
    const meta=[]; if(l)meta.push(l.name); if(e.note)meta.push(e.note); if(e.door)meta.push(e.door); meta.push(fmtDateTime(e.ts));
    return `<div class="logrow"><span class="ld" style="background:${e.alert?'var(--red)':'var(--ok)'}"></span>
      <div class="lc"><div class="lt">${e.label}${e.count!=null?' · '+e.count:''}</div>
      <div class="lm">${meta.join(' · ')}</div></div>
      <div class="la"><button class="iconbtn" title="Bewerken" onclick="editLog(${l?l.id:0},${e.eid})">${ic('pencil')}</button><button class="iconbtn lgdel" title="Verwijderen" onclick="deleteLog(${l?l.id:0},${e.eid})">${ic('trash')}</button></div></div>`;}).join('');
  document.getElementById('tabLog').innerHTML=`<div class="panel"><h2>${ic('book')}Algemeen logboek — alle meldingen</h2><div class="body">
    ${filterBar}
    <div class="muted" style="margin-bottom:8px">${all.length} melding(en)${hasFilter?' (gefilterd)':''}, nieuwste eerst. Basis voor de audit-export (HACCP / EN 16636).</div>
    ${rows||'<p class="muted">Geen meldingen voor deze selectie.</p>'}
  </div></div>`;
}

function deleteLocation(id){

/* ---- ADVIES TAB ---- */
function activityByCat(){const m={};locations.forEach(l=>{const cat=TYPES[l.type].cat;m[cat]=(m[cat]||0)+activityLast30(l.id);});return m;}
function trendDir(){
  const now=Date.now(),d=864e5;let last=0,prev=0;
  Object.keys(logs).forEach(id=>{(logs[id]||[]).forEach(e=>{if(e.alert&&e.count!=null){if(e.ts>=now-14*d)last+=+e.count;else if(e.ts>=now-28*d)prev+=+e.count;}});});
  if(last>prev*1.15)return 'stijgend'; if(last<prev*0.85)return 'dalend'; return 'stabiel';
}
function adviceSummary(){
  const total30=locations.reduce((s,l)=>s+activityLast30(l.id),0);
  if(total30===0) return 'De afgelopen 30 dagen is er nauwelijks tot geen activiteit geregistreerd. De situatie lijkt onder controle — handhaaf het huidige controleschema en houd preventie (afdichting, hygiëne, voorraadrotatie) op orde.';
  const catAct=activityByCat();
  const topCat=Object.keys(catAct).sort((a,b)=>catAct[b]-catAct[a])[0];
  const hotspots=locations.map(l=>({l,a:activityLast30(l.id)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
  const topName=hotspots.length?hotspots[0].l.name:'—';
  return `In de afgelopen 30 dagen zijn er ${total30} waarnemingen/vangsten geregistreerd. De meeste activiteit zit bij ${CATS[topCat]?CATS[topCat].label.toLowerCase():topCat}, met '${topName}' als drukste punt. De trend over de laatste twee weken is ${trendDir()}. Richt je inspanning op de hotspots en de onderstaande aanbevolen acties.`;
}
function adviceActions(){
  const acts=[];const catAct=activityByCat();
  const hotspots=locations.map(l=>({l,a:activityLast30(l.id)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
  if(hotspots.length) acts.push({gi:'pin',t:`Focus op '${hotspots[0].l.name}'`,d:`Dit is het drukste punt (${hotspots[0].a} in 30 dagen). Controleer hier vaker en pak de onderliggende oorzaak aan.`});
  const txt={
    rodent:{t:'Knaagdierbeheersing aanscherpen',d:'Vervang aangevreten aasblokken, dicht toegangswegen (kieren, deuren) en plaats zo nodig extra lokdozen langs looproutes.'},
    crawl:{t:'Kruipende insecten gericht aanpakken',d:'Verhoog monitoring rond water- en warmtebronnen (vaatwasser, leidingen) en zet gel/lokstations in op de hotspots.'},
    fly:{t:'Vliegende insecten terugdringen',d:'Vervang volle vangplaten en UV-buizen ouder dan een jaar; controleer op deuren/ramen zonder horren.'},
    stored:{t:'Voorraad beschermen',d:'Inspecteer voorraad op besmettingshaarden, hanteer FIFO-rotatie en vervang feromonen op tijd.'},
    other:{t:'Overige meldingen opvolgen',d:'Bekijk de logboekmeldingen en bepaal gerichte vervolgacties.'},
  };
  Object.keys(catAct).filter(c=>catAct[c]>0).sort((a,b)=>catAct[b]-catAct[a]).forEach(c=>{if(txt[c])acts.push({gi:(CATS[c]?CATS[c].gi:'box'),t:txt[c].t,d:txt[c].d});});
  if(trendDir()==='stijgend') acts.push({gi:'bars',t:'Tijdelijk vaker controleren',d:'De activiteit neemt toe. Verhoog de controlefrequentie totdat de trend weer daalt.'});
  if(!acts.length) acts.push({gi:'checkc',t:'Geen directe actie nodig',d:'De activiteit is laag. Handhaaf het huidige schema en blijf preventief monitoren.'});
  return acts;
}
function renderAdviceTab(){
  const total30=locations.reduce((s,l)=>s+activityLast30(l.id),0);
  const catAct=activityByCat();
  const topCat=Object.keys(catAct).sort((a,b)=>catAct[b]-catAct[a])[0];
  const hotspots=locations.map(l=>({l,a:activityLast30(l.id)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
  const acts=adviceActions();
  const orderedCats=Object.keys(catAct).filter(c=>catAct[c]>0).sort((a,b)=>catAct[b]-catAct[a]);
  let prodSections='';
  Object.keys(CATS).forEach(cat=>{
    const sig=catSignals(cat);
    const mode=sig.catches>0?'attack':(sig.aas>0?'refill':(sig.full>0?'replace':null));
    if(!mode)return;
    const steps=stepsForMode(mode);
    const plan=planForCat(cat,steps);
    const c=CATS[cat]||CATS.other;
    const hsCat=locations.filter(l=>TYPES[l.type]&&TYPES[l.type].cat===cat).map(l=>({l,a:activityLast30(l.id)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
    let badge,sub;
    if(mode==='attack'){
      badge=sig.catches>=5?['Actie aanbevolen','#FBEDEA','var(--red)']:['Aandacht','#FAF1DF','var(--amber)'];
      sub=`${sig.catches} vangst(en)/waarneming(en) in 30 dagen${hsCat.length?` · vooral bij ‘${hsCat[0].l.name}’`:''}`;
    }else if(mode==='refill'){
      badge=['Aas gegeten','#FAF1DF','var(--amber)'];
      sub=`${sig.aas}× aas aangevreten in 30 dagen — er is activiteit, maar nog geen vangst. Vul het lokaas aan en houd het in de gaten.`;
    }else{
      badge=['Vervangen nodig','#FAF1DF','var(--amber)'];
      sub=`${sig.full}× gemeld dat een navulling vol is of vervangen moet worden.`;
    }
    prodSections+=`<div class="advblock">
      <div class="advhead"><span class="advic ${c.pi}">${ic(c.gi)}</span>
        <div><div class="advtitle">${c.label}</div>

function confirmModal(msg,onYes,yesLabel){
  const host=document.createElement('div');host.id='confirmModal';
  host.innerHTML=`<div class="modal" style="z-index:78">
    <div class="modalcard" style="max-width:340px;text-align:center">
      <div style="font-weight:700;font-size:16px;line-height:1.4">${msg}</div>
      <div style="display:flex;gap:9px;margin-top:18px">
        <button class="btn ghost" style="flex:1;justify-content:center" id="cfNo">Annuleren</button>
        <button class="btn danger" style="flex:1" id="cfYes">${yesLabel||'Verwijderen'}</button>
      </div>
    </div></div>`;
  document.body.appendChild(host);
  function close(){document.removeEventListener('keydown',onKey);host.remove();}
  function onKey(e){if(e.key==='Enter'){e.preventDefault();close();onYes();}else if(e.key==='Escape'){e.preventDefault();close();}}
  document.addEventListener('keydown',onKey);
  host.querySelector('.modal').addEventListener('click',ev=>{if(ev.target===ev.currentTarget)close();});
  host.querySelector('#cfNo').onclick=close;
  host.querySelector('#cfYes').onclick=()=>{close();onYes();};
  host.querySelector('#cfYes').focus();
}

function doScan(stationId,scannedId){
  stopScanner();
  document.getElementById('modalHost').innerHTML='';
  if(scannedId===stationId){scanState[stationId]='ok';scanWrong=null;toast('Juiste QR-code');}
  else{scanWrong={id:stationId,name:locById(scannedId).name};}
  renderMobile();
}
function skipScan(id){stopScanner();scanState[id]='skip';scanWrong=null;renderMobile();}
function rescan(id){delete scanState[id];scanWrong=null;renderMobile();}
function stopScanner(){
  if(qrScanner){const s=qrScanner;qrScanner=null;try{s.stop().then(()=>{try{s.clear();}catch(e){}}).catch(()=>{});}catch(e){}}
}
function startScanner(stationId){
  qrBusy=false;
  const reader=document.getElementById('qrreader'); if(!reader) return;
  if(!window.Html5Qrcode){scannerFallback(stationId,'Scanner niet geladen');return;}
  try{
    qrScanner=new Html5Qrcode('qrreader');
    qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:190,height:190}},
      (text)=>{if(qrBusy)return;qrBusy=true;onScanDecoded(stationId,text);},()=>{})
      .catch(()=>{qrScanner=null;scannerFallback(stationId,'Camera niet beschikbaar in deze preview');});
  }catch(e){qrScanner=null;scannerFallback(stationId,'Camera niet beschikbaar in deze preview');}
}
function onScanDecoded(stationId,text){
  stopScanner();
  const m=/OWLOG:(\d+)/.exec(text||'');const scannedId=m?+m[1]:null;
  if(scannedId===stationId){scanState[stationId]='ok';scanWrong=null;toast('Juiste QR-code');}
  else if(scannedId!=null&&locById(scannedId)){scanWrong={id:stationId,name:locById(scannedId).name};}
  else{scanWrong={id:stationId,name:'onbekende code'};}
  renderMobile();
}
function scannerFallback(stationId,msg){
  const reader=document.getElementById('qrreader'); if(!reader) return;
  const st=locById(stationId);
  const opts=locations.filter(l=>st && l.floorId===st.floorId);

function startRound(fid){
  if(fid==null){
    if(floorplans.length>1){go('pickfloor');return;}
    fid=floorplans.length?floorplans[0].id:null;
  }
  // alles al afgerond? dan begint automatisch een nieuwe cyclus
  const allFids=floorplans.filter(f=>(routes[f.id]||[]).filter(x=>locById(x)).length).map(f=>f.id);
  if(allFids.length && allFids.every(x=>doneFloors[x])){roundStart=Date.now();doneFloors={};scanState={};scanWrong=null;}
  roundFloor=fid;
  const rt=roundRoute();
  if(!rt.length){toast('Geen route op deze plattegrond');return;}
  roundActive=true;
  go('station',{id:rt[0]});
}
function closeWholeRound(){
  const rt=fullRoute();
  const open=rt.filter(id=>!roundStatus(id)).length;
  const doIt=()=>{roundStart=Date.now();doneFloors={};scanState={};scanWrong=null;roundActive=false;roundFloor=null;renderMobile();toast('Ronde afgesloten');};
  if(open>0){confirmModal(`Er staan nog ${open} punt(en) open. Ronde toch afsluiten? Het overzicht begint daarna weer leeg.`,doIt,'Afsluiten');}
  else doIt();
}
function goNext(id){
  const rt=roundRoute();const i=rt.indexOf(id);
  if(i>=0 && i<rt.length-1){go('station',{id:rt[i+1]});}
  else{finishRound();}
}
function finishRound(){
  const rt=roundRoute();
  const done=rt.filter(id=>roundStatus(id)).length;
  const open=rt.length-done;
  if(open>0){confirmModal(`Er staan nog ${open} punt(en) open. Ronde toch afronden?`,doFinishRound,'Afronden');}
  else doFinishRound();
}
function doFinishRound(){
  const rt=roundRoute();
  const done=rt.filter(id=>roundStatus(id)).length;
  const alerts=rt.filter(id=>{const lg=roundStatus(id);return lg&&lg.alert;}).length;
  if(roundFloor && roundFloor!=='__all__'){doneFloors[roundFloor]=true;}
  else{floorplans.forEach(f=>{if((routes[f.id]||[]).length)doneFloors[f.id]=true;});}
  roundActive=false;
  roundFloor=null;
  go('done',{rDone:done,rTotal:rt.length,rAlerts:alerts});
}

let aiOpen=false;

function aiAnswer(q){
  const t=q.toLowerCase();
  const cat=feedCat(t);
  if(/wet|regel|verplicht|certific|kba|ipm|mag ik|toegestaan|\bgif\b|rodenticide/.test(t) && /muis|muizen|rat|knaagdier|gif|rodenticide|aas/.test(t))
    return 'Voor knaagdierbestrijding geldt in Nederland de IPM-aanpak (geborgd via het KPMB-schema): eerst wering en preventie, dan niet-chemische middelen zoals klemmen, en rodenticiden alleen als laatste redmiddel. Sinds 2023 is daarvoor ook binnenshuis een IPM-certificering (KBA/KBA-GB) vereist. Gebruik uitsluitend door het Ctgb toegelaten middelen (N-nummer op het etiket) en registreer elk gebruik in dit logboek.';
  if(/logboek|bewaar|bewaren|termijn|audit|en ?16636|haccp|brc|ifs/.test(t))
    return 'Een geldig logboek registreert per controle: datum, locatie, waarneming, omvang, gebruikte middelen/techniek en de uitvoerder. Volgens EN 16636 bewaar je dit minimaal 1 jaar; voedselveiligheidsschema’s (HACCP/IFS/BRC) vragen in de praktijk 2–3 jaar, plus een plattegrond met genummerde punten, trendanalyse en corrigerende acties. Deze app legt die onderdelen vast.';
  if(/wat moet ik|eerst doen|aanpak|hotspot|prioriteit|activiteit/.test(t)){
    const hs=locations.map(l=>({l,a:activityLast30(l.id)})).filter(x=>x.a>0).sort((a,b)=>b.a-a.a);
    if(!hs.length) return 'Er is de afgelopen 30 dagen geen activiteit gemeld — goed nieuws. Houd je controleschema aan en blijf inzetten op preventie: voedsel afgesloten bewaren, kieren dichten en afvalbeheer op orde.';
    return 'Op basis van jouw logboek heeft ‘'+hs[0].l.name+'’ de meeste recente activiteit ('+hs[0].a+' in 30 dagen) en is de trend '+trendDir()+'. Mijn advies: controleer dit punt tijdelijk vaker, zoek de oorzaak (voedselbron of toegang) en versterk daar de bezetting. Op het tabblad Advies staan passende producten.';
  }
  if(/product|middel|aanrader|aanraden|kopen|bestellen/.test(t) && cat!=='other'){
    const ps=productsForCat(cat,3);
    return 'Aanraders uit de shop: '+ps.map(p=>p.name+(p.price?' ('+p.price+')':'')).join(' · ')+'. Op het tabblad Advies vind je ze met uitleg en directe link.';
  }
  if(/muis|muizen/.test(t)) return 'Muizen: dicht openingen vanaf ca. 5 mm (leidingdoorvoeren, deurranden), bewaar voedsel afgesloten en plaats klemmen of lokdozen langs plinten en looproutes — muizen steken zelden open ruimtes over. Vang je er meerdere per week, verhoog dan de bezetting en de controlefrequentie. Gif is volgens IPM pas toegestaan als preventie en klemmen aantoonbaar onvoldoende werken.';
  if(/\brat\b|ratten/.test(t)) return 'Ratten: zoek eerst de bron (voedsel, water, schuilplekken), dicht openingen vanaf 2 cm en controleer riolering en gevelranden. Gebruik verankerde, afsluitbare lokdozen. Rodenticiden mogen buiten uitsluitend door IPM-gecertificeerde personen (KBA-GB) worden toegepast.';
  if(/kakkerlak/.test(t)) return 'Kakkerlakken: richt je op warme, vochtige plekken (vaatwasser, motorruimtes, leidingkokers). Werk met gel-lokaas en monitoringsvallen, en spuit niet op plekken waar gel ligt — dat maakt het lokaas onaantrekkelijk. Hygiëne en kitwerk zijn het halve werk; bij aanhoudende vangsten is professionele bestrijding verstandig.';
  if(/wesp/.test(t)) return 'Wespen: behandel een nest bij voorkeur ’s avonds, als alle wespen binnen zijn. Een bereikbaar nest behandel je met poeder in de invliegopening; bij hoogte of risico schakel je een professional in. Losse overlast op het terras? Plaats een wespenval op afstand.';
  if(/mot\b|motten/.test(t)) return 'Voorraadmotten: gooi besmette producten direct weg, stofzuig kieren en naden van kasten, en hang feromoonvallen op om de mannetjes weg te vangen en de cyclus te doorbreken. Roteer voorraad (FIFO) en bewaar droogwaren in afgesloten bakken.';
  if(/vlieg|mug\b|muggen/.test(t)) return 'Vliegen: wering eerst (horren, deurbeleid, afvalbeheer), daarna UV-lampen op strategische plekken — nooit direct boven onafgedekt voedsel. Vervang vangplaten regelmatig; veel vangst op één lamp wijst op een bron in de buurt.';
  if(/bel|telefoon|contact|mens|specialist/.test(t)) return 'Je kunt onze specialisten altijd bellen op 072 532 45 07 — we denken graag mee over jouw situatie.';
  return 'Daar heb ik in deze demo nog geen pasklaar antwoord op. In de definitieve app word ik getraind op de actuele Nederlandse regelgeving en best practices, en ken ik jouw volledige logboek. Liever direct advies van een mens? Bel 072 532 45 07.';
}

  }catch(e){}

async function cloudSaveNow(){
  if(!CLOUD||!cloudUser) return;
  try{await sb.from('org_state').upsert({user_id:cloudUser.id,state:appState(),updated_at:new Date().toISOString()});}catch(e){}
}
function cloudSave(){
  if(!CLOUD||!cloudUser) return;
  clearTimeout(_syncT); _syncT=setTimeout(cloudSaveNow,1500);
}
function renderAuth(){
  let el=document.getElementById('authOverlay');
  if(!el){el=document.createElement('div');el.id='authOverlay';document.body.appendChild(el);}
  el.innerHTML=`<div class="modal" style="z-index:95;background:var(--bg)"><div class="modalcard" style="max-width:380px">
    <div style="text-align:center;margin-bottom:4px"><img src="https://ongediertewinkel.nl/content/uploads/2024/03/logo_ongedierte.png" alt="Ongediertewinkel" style="height:44px"></div>
    <h3 style="text-align:center;margin-top:0">Digitaal logboek</h3>
    <p class="muted" style="text-align:center;margin:-4px 0 6px">Log in of maak gratis een account aan. Je gegevens worden veilig opgeslagen en gesynchroniseerd tussen je telefoon en desktop.</p>
    <label class="fld-l">E-mailadres</label>
    <input id="auEmail" class="fld" type="email" placeholder="naam@bedrijf.nl">
    <label class="fld-l">Wachtwoord</label>
    <input id="auPass" class="fld" type="password" onkeydown="if(event.key==='Enter')authLogin()">
    <div style="display:flex;gap:9px;margin-top:18px">
      <button class="btn ghost" style="flex:1;justify-content:center" onclick="authRegister()">Account aanmaken</button>
      <button class="btn" style="flex:1" onclick="authLogin()">Inloggen</button>
    </div>
    <button class="skip" style="display:block;width:100%;text-align:center;color:var(--muted);font-size:13px;font-weight:550;padding:9px;margin-top:4px" onclick="authReset()">Wachtwoord vergeten?</button>
  </div></div>`;
}
function hideAuth(){const el=document.getElementById('authOverlay');if(el)el.remove();}
async function authLogin(){
  const e=(document.getElementById('auEmail')||{}).value||'', p=(document.getElementById('auPass')||{}).value||'';
  if(!e||!p){toast('Vul e-mail en wachtwoord in');return;}
  const r=await sb.auth.signInWithPassword({email:e.trim(),password:p});
  if(r.error)toast(r.error.message);
}
async function authRegister(){
  const e=(document.getElementById('auEmail')||{}).value||'', p=(document.getElementById('auPass')||{}).value||'';
  if(!e||!p){toast('Vul e-mail en wachtwoord in');return;}
  if(p.length<8){toast('Wachtwoord: minimaal 8 tekens');return;}
  const r=await sb.auth.signUp({email:e.trim(),password:p});
  if(r.error){toast(r.error.message);return;}
  toast('Account aangemaakt — check je e-mail ter bevestiging');
}
async function authReset(){
  const e=(document.getElementById('auEmail')||{}).value||'';
  if(!e){toast('Vul eerst je e-mailadres in');return;}
  await sb.auth.resetPasswordForEmail(e.trim());
  toast('Resetlink verstuurd naar '+e);
}
function authLogout(){ if(sb) sb.auth.signOut(); }

/* ============ FEEDBACK / BUG-MELDER ============ */
let fbDraft=null;
function fbStore(){try{return JSON.parse(localStorage.getItem('owlog_fb')||'[]');}catch(e){return [];}}
function fbSaveStore(a){try{localStorage.setItem('owlog_fb',JSON.stringify(a));}catch(e){}}
function fbScreenLabel(){return view==='mobile'?('Mobiel · '+(mScreen.name||'home')):('Desktop · '+desktopTab);}
function renderFbWidget(){
  const el=document.getElementById('fbWidget'); if(!el)return;
  const n=fbStore().length;
  el.innerHTML=`${n?`<button class="fbpill" onclick="fbOverview()">${ic('inbox')} Feedback-overzicht (${n})</button>`:''}
    <button class="fbfab" onclick="fbStart()">${ic('flag')} Meld iets op deze pagina</button>`;
}
function fbStart(){
  if(!window.html2canvas){toast('Schermafbeelding-tool nog niet geladen, probeer zo opnieuw');return;}
  const w=document.getElementById('fbWidget'); if(w)w.style.visibility='hidden';
  const ai=document.getElementById('aiChat'); const aiv=ai?ai.style.visibility:''; if(ai)ai.style.visibility='hidden';
  toast('Schermafbeelding maken…');
  html2canvas(document.body,{useCORS:true,backgroundColor:'#F4F6F7',logging:false,scale:1,
    x:window.scrollX,y:window.scrollY,width:window.innerWidth,height:window.innerHeight})
   .then(cv=>{
     if(w)w.style.visibility=''; if(ai)ai.style.visibility=aiv;
     fbDraft={shot:cv.toDataURL('image/jpeg',0.75),markers:[],label:fbScreenLabel(),ts:Date.now()};
     renderFbModal();
   }).catch(()=>{if(w)w.style.visibility='';if(ai)ai.style.visibility=aiv;toast('Schermafbeelding mislukt');});
}
function renderFbModal(){
  const d=fbDraft; if(!d)return;
  document.getElementById('modalHost').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="modalcard fbcard2">
    <h3 style="text-align:center;margin-top:0;margin-bottom:2px">Wat is hier mis?</h3>
    <p class="muted" style="text-align:center;margin:0 0 8px">Klik op de afbeelding om een punt te markeren, of beschrijf het onderaan. Pagina: <b>${d.label}</b></p>
    <div class="fbscroll">
      <div class="fbshotwrap" id="fbShot" onclick="fbAddMarker(event)">
        <img src="${d.shot}" alt="schermafbeelding">
        ${d.markers.map((m,i)=>`<span class="fbpin" style="left:${m.x}%;top:${m.y}%">${i+1}</span>`).join('')}
      </div>
      ${d.markers.map((m,i)=>`<div class="fbmark"><span class="num">${i+1}</span><input id="fbm_${i}" placeholder="Wat klopt er niet op dit punt?" value="${(m.text||'').replace(/"/g,'&quot;')}"><span class="rm" onclick="fbDelMarker(${i})">${ic('x')}</span></div>`).join('')}
    </div>
    <label class="fld-l" style="margin-top:10px">Algemene opmerking</label>
    <textarea id="fbGen" style="min-height:54px" placeholder="Beschrijf wat er op deze pagina gebeurt of misgaat…">${(d.general||'')}</textarea>
    <div style="display:flex;gap:9px;margin-top:12px">
      <button class="btn ghost" style="flex:1;justify-content:center" onclick="closeModal()">Annuleren</button>
      <button class="btn" style="flex:1" onclick="fbSubmit()">${ic('check')} Feedback opslaan</button>
    </div></div></div>`;
}
function fbReadInputs(){
  if(!fbDraft)return;
  fbDraft.markers.forEach((m,i)=>{const el=document.getElementById('fbm_'+i);if(el)m.text=el.value;});
  const g=document.getElementById('fbGen'); fbDraft.general=g?g.value:'';
}
function fbAddMarker(ev){
  if(ev.target.classList.contains('fbpin'))return;
  fbReadInputs();
  const wrap=document.getElementById('fbShot');const r=wrap.getBoundingClientRect();
  const x=clamp((ev.clientX-r.left)/r.width*100), y=clamp((ev.clientY-r.top)/r.height*100);
  fbDraft.markers.push({x,y,text:''});
  renderFbModal();
  const last=document.getElementById('fbm_'+(fbDraft.markers.length-1)); if(last)last.focus();
}
function fbDelMarker(i){fbReadInputs();fbDraft.markers.splice(i,1);renderFbModal();}
function fbSubmit(){
  fbReadInputs();
  if(!fbDraft.general.trim() && !fbDraft.markers.some(m=>m.text.trim())){toast('Voeg minstens één opmerking toe');return;}
  const arr=fbStore();
  arr.push({id:'fb_'+Date.now(),ts:fbDraft.ts,label:fbDraft.label,general:fbDraft.general.trim(),markers:fbDraft.markers.filter(m=>m.text.trim()),shot:fbDraft.shot,url:location.href});
  fbSaveStore(arr);
  if(CLOUD&&sb&&cloudUser){try{sb.from('feedback').insert({user_id:cloudUser.id,page:fbDraft.label,body:fbDraft.general,markers:fbDraft.markers,shot:fbDraft.shot});}catch(e){}}
  fbDraft=null;
  document.getElementById('modalHost').innerHTML='';
  renderFbWidget();
  toast('Bedankt! Je feedback is opgeslagen.');
}
function fbOverview(){
  const arr=fbStore().slice().reverse();
  document.getElementById('modalHost').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="modalcard" style="max-width:760px;width:100%">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><h3 style="margin:0;flex:1">Feedback-overzicht (${arr.length})</h3>
      ${arr.length?`<button class="btn ghost sm" onclick="fbExport()">${ic('print')} Exporteren</button>`:''}
      <button class="iconbtn" onclick="closeModal()">${ic('x')}</button></div>
    <p class="muted" style="margin:-2px 0 12px">Alles wat op de pagina's is gemeld. ${CLOUD?'':'Let op: in deze demoversie staat dit lokaal op dit apparaat — voor centraal verzamelen van álle testers is de cloud-koppeling (Supabase) nodig.'}</p>
    ${arr.length?arr.map(f=>`<div class="fbcardrow">
      <img src="${f.shot}" onclick="window.open('${f.shot}','_blank')" alt="">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700">${f.label} <span class="muted" style="font-weight:400">· ${fmtDateTime(f.ts)}</span></div>
        ${f.general?`<div style="font-size:13.5px;margin-top:4px">${f.general}</div>`:''}
        ${f.markers.map((m,i)=>`<div class="fbm"><span class="num">${i+1}</span><span>${m.text}</span></div>`).join('')}
      </div>
      <button class="iconbtn lgdel" title="Verwijderen" onclick="fbDelete('${f.id}')">${ic('trash')}</button>
    </div>`).join(''):'<p class="muted">Nog geen feedback gemeld.</p>'}
  </div></div>`;
}
function fbDelete(id){fbSaveStore(fbStore().filter(f=>f.id!==id));fbOverview();renderFbWidget();}
function fbExport(){
  const arr=fbStore();const w=window.open('','_blank');if(!w){toast('Sta pop-ups toe');return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Feedback-overzicht</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#222}h1{font-size:20px}.item{border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:16px;page-break-inside:avoid}img{max-width:380px;border:1px solid #ddd;border-radius:6px;display:block;margin-top:8px}.lbl{font-weight:bold}.mk{margin:3px 0}</style></head><body><h1>Feedback-overzicht (${arr.length})</h1>${arr.map(f=>`<div class="item"><div class="lbl">${f.label} — ${fmtDateTime(f.ts)}</div>${f.general?`<p>${f.general}</p>`:''}${f.markers.map((m,i)=>`<div class="mk">${i+1}. ${m.text}</div>`).join('')}<img src="${f.shot}"></div>`).join('')}</body></html>`);
  w.document.close();
}

/* ============ INIT ============ */
loadState();
buildProdIdx();
setView(view);
renderFbWidget();
if(CLOUD){ cloudInit(); renderAuth(); }
else { renderAi(); loadFeed(); }
/* live bijwerken als een ander tabblad (bijv. de mobiele weergave) een ronde logt */
window.addEventListener('storage',(ev)=>{
  if(ev.key==='owlog_v1'&&ev.newValue){
    try{applyState(JSON.parse(ev.newValue));}catch(e){}
    if(view==='desktop')renderDesktop();else renderMobile();
  }
});
</script>
